version: '3.8'

networks:
  quant-net:
    driver: bridge

services:
  # etcd - Strategy center for C++ engine to watch strategy changes
  # Note: Using locally built image. For fresh install, pull from:
  #   docker pull quay.io/coreos/etcd:v3.5.11
  #   docker tag quay.io/coreos/etcd:v3.5.11 learn-path-etcd:latest
  # Or use bitnami/etcd:3.5.11 if network allows
  etcd:
    image: learn-path-etcd:latest
    container_name: quant-etcd
    hostname: etcd
    ports:
      - "2379:2379"   # Client communication
      - "2380:2380"   # Peer communication
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
      - ETCD_LISTEN_CLIENT_URLS=http://0.0.0.0:2379
      - ETCD_ADVERTISE_CLIENT_URLS=http://etcd:2379
      - ETCD_LISTEN_PEER_URLS=http://0.0.0.0:2380
      - ETCD_INITIAL_ADVERTISE_PEER_URLS=http://etcd:2380
      - ETCD_INITIAL_CLUSTER=etcd=http://etcd:2380
      - ETCD_NAME=etcd
    volumes:
      - ./data/etcd:/etcd
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - quant-net
    restart: unless-stopped

  # MinIO - S3-compatible object storage for historical market data (Parquet files)
  minio:
    image: minio/minio:RELEASE.2024-01-13T07-53-03Z
    container_name: quant-minio
    hostname: minio
    ports:
      - "9010:9000"   # API port (mapped to 9010 to avoid conflict)
      - "9011:9001"   # Console port (mapped to 9011 to avoid conflict)
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-quantadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-quantadmin123}
    command: server /data --console-address ":9001"
    volumes:
      - ./data/minio:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
      start_period: 30s
    networks:
      - quant-net
    restart: unless-stopped

  # MinIO initialization - Create required buckets
  # Run once after MinIO is healthy: docker-compose up minio-init
  minio-init:
    image: minio/mc:RELEASE.2024-01-16T17-11-14Z
    container_name: quant-minio-init
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-http://minio:9000}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-quantadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-quantadmin123}
    entrypoint: >
      /bin/sh -c "
        mc alias set quant-minio http://minio:9000 ${MINIO_ACCESS_KEY:-quantadmin} ${MINIO_SECRET_KEY:-quantadmin123};
        mc mb quant-minio/quant-kline --ignore-existing;
        mc mb quant-minio/quant-factor --ignore-existing;
        mc mb quant-minio/quant-corporate-actions --ignore-existing;
        echo 'Buckets created successfully';
        mc ls quant-minio;
      "
    networks:
      - quant-net
    profiles:
      - init
